version: 2

project_name: wuu

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/wuu
    binary: wuu
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/blueberrycongee/wuu/internal/version.Version=v{{.Version}}
      - -X github.com/blueberrycongee/wuu/internal/version.Commit={{.ShortCommit}}
      - -X github.com/blueberrycongee/wuu/internal/version.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: blueberrycongee
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/blueberrycongee/wuu"
    description: "AI coding agent for the terminal"
    license: "MIT"
    install: |
      bin.install "wuu"
    test: |
      assert_match "wuu", shell_output("#{bin}/wuu --version")
